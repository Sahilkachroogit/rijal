<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cart — Rijal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { heading: ["'Instrument Serif'", "serif"], body: ["'Barlow'", "sans-serif"] },
        colors: { bg:"#1a0508", ink:"#E8D8C4", amber:{ 300:"#C7B7A3", 400:"#C7B7A3", 500:"#6D2932" } },
      },
    },
  };
</script>
<style>
  :root{--bg:#1a0508;--ink:#E8D8C4;}
  html,body{background:#1a0508;color:var(--ink);}
  body{font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;}
  header{position:relative;z-index:50;}
  .font-heading{font-family:'Instrument Serif',serif;}.font-body{font-family:'Barlow',sans-serif;}
  .liquid-glass{background:rgba(255,255,255,0.025);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:none;box-shadow:inset 0 1px 1px rgba(255,255,255,0.08);position:relative;overflow:hidden;}
  .liquid-glass::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,.15) 80%,rgba(255,255,255,.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .liquid-glass-strong{background:rgba(255,255,255,0.04);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:none;box-shadow:4px 4px 4px rgba(0,0,0,.05),inset 0 1px 1px rgba(255,255,255,.18);position:relative;overflow:hidden;}
  .liquid-glass-strong::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,.22) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,.22) 80%,rgba(255,255,255,.55) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .cine-hero{background:radial-gradient(60% 80% at 30% 20%,rgba(109,41,50,.28),transparent 60%),radial-gradient(50% 70% at 80% 90%,rgba(86,28,36,.18),transparent 60%),linear-gradient(180deg,#200a0e 0%,#1a0508 60%,#110305 100%);}
  .cine-cta{background:radial-gradient(60% 80% at 30% 80%,rgba(109,41,50,.28),transparent 60%),radial-gradient(80% 60% at 80% 20%,rgba(86,28,36,.14),transparent 60%),linear-gradient(180deg,#1c0609 0%,#1a0508 100%);}
  ::selection{background:rgba(109,41,50,0.45);color:#E8D8C4;}
  .btn{display:inline-flex;align-items:center;gap:.5rem;border-radius:9999px;padding:.6rem 1rem;font-size:.875rem;font-weight:500;}
  .btn-primary{background:#fff;color:#1a0508;}.btn-primary:hover{background:#E8D8C4;}
  .btn-amber{background:linear-gradient(180deg,#6D2932,#3D0F17);color:#E8D8C4;}.btn-amber:hover{filter:brightness(1.08);}
  .ic{width:18px;height:18px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .photo-frame{background:radial-gradient(80% 80% at 50% 50%,rgba(86,28,36,.12),transparent 70%);}
  @media(max-width:767px){.liquid-glass{backdrop-filter:blur(4px);}.liquid-glass-strong{backdrop-filter:blur(12px);}}
</style>
</head>
<body class="bg-bg text-ink antialiased">

<header class="fixed top-4 left-0 right-0 z-50 px-4 md:px-8 lg:px-16 py-3">
  <div class="flex items-center justify-between gap-4">
    <a href="/" class="flex items-center gap-2"><span class="liquid-glass-strong rounded-full h-11 w-11 grid place-items-center"><span class="font-heading italic text-xl text-amber-300">R</span></span><span class="hidden md:inline font-heading italic text-xl tracking-tight">Rijal</span></a>
    <nav class="hidden md:flex liquid-glass rounded-full px-1.5 py-1 items-center gap-0.5">
      <a href="/" class="px-3 py-2 text-sm font-medium text-ink/70 font-body rounded-full hover:text-white">Home</a>
      <a href="/shop.html" class="px-3 py-2 text-sm font-medium text-ink/70 font-body rounded-full hover:text-white">Shop</a>
      <a href="/about.html" class="px-3 py-2 text-sm font-medium text-ink/70 font-body rounded-full hover:text-white">About</a>
      <a href="/contact.html" class="px-3 py-2 text-sm font-medium text-ink/70 font-body rounded-full hover:text-white">Contact</a>
    </nav>
    <div class="flex items-center gap-2">
      <a href="/cart.html" class="relative liquid-glass-strong rounded-full p-2.5 inline-flex items-center justify-center" aria-label="Cart">
        <svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span data-cart-count style="display:none" class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-white text-[#1a0508] text-[10px] font-bold flex items-center justify-center leading-none"></span>
      </a>
      <button onclick="document.getElementById('mob-nav').classList.toggle('hidden')" class="md:hidden liquid-glass rounded-full p-2.5" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </div>
  </div>
  <div id="mob-nav" class="hidden md:hidden mt-2 liquid-glass rounded-2xl px-4 py-3 flex-col gap-1">
    <a href="/" class="block py-2 text-sm font-medium font-body hover:text-white">Home</a>
    <a href="/shop.html" class="block py-2 text-sm font-medium font-body hover:text-white">Shop</a>
    <a href="/about.html" class="block py-2 text-sm font-medium font-body hover:text-white">About</a>
    <a href="/contact.html" class="block py-2 text-sm font-medium font-body hover:text-white">Contact</a>
  </div>
</header>

<main class="cine-hero min-h-screen pt-28 pb-20 px-6">
  <div class="max-w-2xl mx-auto">
    <p class="font-body text-amber-300 uppercase tracking-[0.3em] text-xs mb-3">Your Cart</p>
    <h1 class="font-heading text-4xl md:text-5xl text-ink mb-10">Order Summary</h1>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20">
      <svg style="width:56px;height:56px;stroke:rgba(232,216,196,0.2);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 24px" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <p class="font-body text-ink/50 mb-6">Your cart is empty.</p>
      <a href="/shop.html" class="btn btn-primary rounded-full px-8 py-3 text-base">Browse Products</a>
    </div>

    <!-- Cart items -->
    <div id="cart-content" class="hidden">
      <div id="cart-items" class="space-y-4 mb-6"></div>

      <!-- Totals -->
      <div class="liquid-glass rounded-2xl p-6 mb-6">
        <div class="flex justify-between font-body text-ink/70 mb-2 text-sm">
          <span>Subtotal</span><span id="cart-subtotal">₹0</span>
        </div>
        <div class="flex justify-between font-body text-ink/70 mb-4 text-sm">
          <span>Shipping</span><span class="text-green-400 font-medium">FREE</span>
        </div>
        <div class="border-t border-white/10 pt-4 flex justify-between font-heading text-2xl text-ink">
          <span>Total</span><span id="cart-total">₹0</span>
        </div>
      </div>

      <a href="/checkout.html" class="btn btn-amber w-full justify-center rounded-xl py-4 text-base mb-3">Proceed to Checkout →</a>
      <a href="/shop.html" class="btn liquid-glass w-full justify-center rounded-xl py-4 text-base text-ink/70">← Continue Shopping</a>
    </div>
  </div>
</main>

<footer class="cine-cta border-t border-white/10 px-6 py-6 text-center">
  <p class="font-body text-xs text-white/30">© 2026 Rijal</p>
</footer>

<script src="/cart-utils.js"></script>
<script>
  function renderCart() {
    const cart = getCart();
    const entries = Object.entries(cart).filter(([id]) => CART_PRODUCTS[id]);

    if (entries.length === 0) {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('cart-content').classList.add('hidden');
      return;
    }

    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('cart-content').classList.remove('hidden');

    let subtotal = 0;
    const html = entries.map(([id, qty]) => {
      const p = CART_PRODUCTS[id];
      const line = p.price * qty;
      subtotal += line;
      return `
        <div class="liquid-glass rounded-2xl p-4 flex gap-4 items-center">
          <a href="${p.url}" class="photo-frame rounded-xl overflow-hidden w-20 h-20 flex-shrink-0">
            <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" />
          </a>
          <div class="flex-1 min-w-0">
            <a href="${p.url}" class="font-heading text-lg text-ink leading-tight hover:text-amber-300 transition-colors">${p.name}</a>
            <p class="font-body text-ink/60 text-sm mt-1">₹${p.price} each</p>
            <div class="flex items-center gap-3 mt-3">
              <div class="liquid-glass-strong rounded-full flex items-center">
                <button onclick="changeQty('${id}', ${qty - 1})" class="w-9 h-9 flex items-center justify-center text-ink hover:text-white text-lg leading-none" aria-label="Decrease">−</button>
                <span class="font-body text-ink w-6 text-center text-sm select-none">${qty}</span>
                <button onclick="changeQty('${id}', ${qty + 1})" class="w-9 h-9 flex items-center justify-center text-ink hover:text-white text-lg leading-none" aria-label="Increase">+</button>
              </div>
              <button onclick="removeItem('${id}')" class="font-body text-xs text-red-400/70 hover:text-red-400 transition-colors">Remove</button>
            </div>
          </div>
          <span class="font-body font-semibold text-ink flex-shrink-0 text-lg">₹${line}</span>
        </div>`;
    }).join('');

    document.getElementById('cart-items').innerHTML = html;
    document.getElementById('cart-subtotal').textContent = `₹${subtotal}`;
    document.getElementById('cart-total').textContent = `₹${subtotal}`;
  }

  function changeQty(id, newQty) {
    updateCartQty(id, newQty);
    renderCart();
  }

  function removeItem(id) {
    removeFromCart(id);
    renderCart();
  }

  renderCart();
</script>
</body>
</html>
